# Phantom configuration
# Place at ~/.config/phantom/config.toml

# Log level: trace, debug, info, warn, error
log_level = "info"

# Fullscreen Waydroid touch resolution
# Set both values. Phantom treats this as the runtime screen contract.
[screen]
width = 1920
height = 1080

# Optional: override the Waydroid work directory if you do not use /var/lib/waydroid
[waydroid]
# work_dir = "/var/lib/waydroid"
