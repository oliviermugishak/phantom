# Phantom configuration
# `./install.sh` creates ~/.config/phantom/config.toml automatically on first install.
# The GUI discovers profiles from ~/.config/phantom/profiles/.

# Log level: trace, debug, info, warn, error
# Use "trace" for useful runtime diagnosis.
# For raw evdev/device firehose logging, also run with:
#   PHANTOM_TRACE_DETAIL=1 phantom --trace --daemon
log_level = "info"

# Recommended backend for Waydroid:
# - "android_socket" is the primary backend and the recommended path
# - "uinput" is the legacy compatibility backend
touch_backend = "android_socket"

# Fullscreen Android touch resolution.
# This is the runtime screen contract used by the daemon.
[screen]
width = 1920
height = 1080

# Android framework backend settings.
# Build the server first with:
#   ./contrib/android-server/build.sh
[android]
auto_launch = true
# Optional explicit override. If missing or stale, Phantom also tries the
# installed jar under ~/.local/share/phantom/android/ and the current source
# tree's contrib/android-server/build/phantom-server.jar. Packaged installs
# also resolve /usr/lib/phantom/phantom-server.jar and ../lib/phantom relative
# to the current executable.
# `./install.sh` replaces this placeholder with the installed jar path automatically.
server_jar = "/absolute/path/to/phantom-server.jar"
server_class = "com.phantom.server.PhantomServer"
container_bind_host = "0.0.0.0"
port = 27183
container_server_jar = "/data/local/tmp/phantom-server.jar"
container_log_path = "/data/local/tmp/phantom-server.log"

# Optional explicit overrides. In normal use, the daemon derives these automatically.
#host = "192.168.240.112"
#socket_path = "/var/lib/waydroid/data/local/tmp/phantom.sock"
#container_socket_path = "/data/local/tmp/phantom.sock"

[waydroid]
work_dir = "/var/lib/waydroid"

# Optional daemon-level hotkeys.
# Use a known key name like "F1" or "MouseRight".
# Use "" or "none" to disable a hotkey entirely.
# On many laptops, enable Fn Lock if you want the top row to emit real F-keys.
# F10 controls the experimental debug overlay preview.
[runtime_hotkeys]
mouse_toggle = "F1"
capture_toggle = "F8"
pause_toggle = "F9"
overlay_toggle = "F10"
shutdown = "F2"
