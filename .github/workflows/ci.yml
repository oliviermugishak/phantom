name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  ANDROID_API_LEVEL: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"

jobs:
  linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --quiet

      - name: Run clippy
        run: cargo clippy --quiet --all-targets --all-features -- -D warnings

      - name: Build release binaries
        run: cargo build --release --quiet

      - name: Build Android server jar
        run: |
          export ANDROID_JAR="$ANDROID_SDK_ROOT/platforms/android-${ANDROID_API_LEVEL}/android.jar"
          export D8="$ANDROID_SDK_ROOT/build-tools/${ANDROID_BUILD_TOOLS}/d8"
          ./contrib/android-server/build.sh
